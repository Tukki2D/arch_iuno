# custom.conf — personal Hyprland configuration
# Sourced from hyprland.conf via: source = ~/.config/hypr/custom.conf
#
# Contains: personal variables, autostart, look and feel overrides,
#           keybind overrides, window rules, and workspace rules.
# On Hyprland updates: hyprland.conf is replaced with upstream default + source block.
# This file is untouched by updates.

####################
### MY PROGRAMS  ###
####################

$terminal = alacritty
$fileManager = dolphin
$menu = hyprlauncher
$Waterfox = waterfox

#################
### AUTOSTART ###
#################

exec-once = ckb-next -b
exec-once = steam -silent
exec-once = sleep 5 && discord
exec-once = Telegram --startminimized
exec-once = dunst
exec-once = quickshell
exec-once = qs -c noctalia-shell
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = systemctl --user start xdg-desktop-portal-hyprland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    resize_on_border = true
    layout = master
}

decoration {
    rounding = 5
    rounding_power = 1
}

layerrule {
    name = noctalia
    match:namespace = noctalia-background-.*$
    ignore_alpha = 0.5
    blur = true
    blur_popups = true
}

####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, exec, $Waterfox
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Smart gaps — no gaps when only one window
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]
    border_size = 0
    rounding = 0
}

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]
    border_size = 0
    rounding = 0
}
