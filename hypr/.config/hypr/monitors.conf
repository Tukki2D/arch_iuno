# monitors.conf — Hyprland monitor configuration
# Sourced from hyprland.conf via: source = ~/.config/hypr/monitors.conf
#
# IMPORTANT: connector names are system-specific.
# Run: hyprctl monitors
# to find the correct names for your hardware.
# On a new system, verify connector names before uncommenting.

################
### MONITORS ###
################

monitor = DP-3,   2560x1440@143.99899,  0x0,     1.0
monitor = HDMI-A-1, 1920x1080@60.00000, -1920x0,  1.0
monitor = DP-2,   3840x2160@59.99700,   0x1440,  1.25

# Fallback — any unconfigured monitor uses preferred settings
monitor = , preferred, auto, auto
