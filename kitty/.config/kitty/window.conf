# window.conf — kitty window configuration
# Included from custom.conf via: include window.conf
#
# Owns: window geometry, opacity, blur, tab bar settings.
# On kitty updates: check changelog for new window options.
# Reference: https://sw.kovidgoyal.net/kitty/conf/

remember_window_size  no
initial_window_width  1280
initial_window_height 720
remember_window_position yes
window_title_bar top
tab_bar_edge bottom
tab_bar_margin_width 4.0
tab_bar_margin_height 2.0 2.0
tab_bar_style powerline
background_opacity 0.85
# background_blur requires compositor blur support (niri blur pending next release)
background_blur 80
