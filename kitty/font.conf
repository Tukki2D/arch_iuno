# font.conf — kitty font configuration
# Included from custom.conf via: include font.conf
#
# NOT included by default — uncomment in custom.conf after verifying font is installed.
# Verify with: fc-list | grep "JetBrainsMono"
# Install with: paru -S ttf-jetbrains-mono-nerd

font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
